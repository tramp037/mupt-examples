inputs_file: inputs.yaml
dirname: polyamide_mpd-tmc

# Define SMILES strings for the molecules
molecules:
    MPD:
        smi: 'c1ccc(N)cc1N'
    TMC:
        smi: 'c1c(C(=O)Cl)cc(C(=O)Cl)cc1C(=O)Cl'

# Define the pieces of the reaction template
# change to reactions: reactants: react_template: products: prod_template:
reactions:
    reaction_1:
        reactants:
            - MPD
            - TMC
        react_template:
            - '[N:1]'
            - '[C:2](=[O:3])Cl'
        react_idx:
            - 0
            - 0
        products:
            - DIM
        prod_template:
            - '[N:1][C:2]=[O:3]'
        prod_idx:
            - 0
            - 1